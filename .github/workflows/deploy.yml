name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  STACK_BASE_NAME: options-advisor

jobs:
  deploy-dev:
    name: Deploy — dev
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      api-url: ${{ steps.outputs.outputs.api-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap CDK (idempotent)
        run: npx cdk bootstrap

      - name: Deploy dev stack
        run: |
          npx cdk deploy "$STACK_BASE_NAME-dev" \
            --require-approval never \
            -c stackType=dev \
            --outputs-file cdk-outputs.json

      - name: Extract API URL
        id: outputs
        run: echo "api-url=$(jq -r '.[keys[0]].ApiUrl' cdk-outputs.json)" >> "$GITHUB_OUTPUT"

  acceptance-test-dev:
    name: Acceptance tests — dev
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Seed watchlist
        run: ./scripts/seed-watchlist.sh dev
        env:
          AWS_DEFAULT_REGION: us-east-1

      - name: Run acceptance tests
        run: npm run test:acceptance
        env:
          STAGE: dev
          AWS_REGION: us-east-1

  deploy-prod:
    name: Deploy — production
    needs: acceptance-test-dev
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap CDK (idempotent)
        run: npx cdk bootstrap

      - name: Deploy production stack
        run: |
          npx cdk deploy "$STACK_BASE_NAME" \
            --require-approval never \
            -c stackType=prod
